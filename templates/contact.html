{% extends "base.html" %}
{% block title %}Contact{% endblock title %}
{%block body%}

{% load static %}
<body>
<form method="post" action="/contact" >
  {% csrf_token %}
  <div class="container my-0 px-0"
    style="background-image: url('static/img/contact.jpg'); background-size: cover; background-position: center;">
    <h2>Contact us</h2>
    <div style="background-color: rgba(255, 255, 255, 0.3)">
      <div class="mb-3" my-2;style="background-color: rgba(255, 255, 255, 0.3)">
        <label for="name" class="form-label">Name</label><br>
        <input type="text" class="form-control" id="name" name="name" placeholder="enter your name"
          style="background-color: rgba(255, 255, 255, 0.3)">
      </div>
      <div class="mb-3" ;style="background-color: rgba(255, 255, 255, 0.3)">
        <label for="email" class="form-label">Email address</label><br>
        <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com"
          style="background-color: rgba(255, 255, 255, 0.3)">
      </div>

      <div class="mb-3" ;style="background-color: rgba(255, 255, 255, 0.3)">
        <label for="phone" class="form-label">phone</label><br>
        <input type="text" class="form-control" id="phone" name="phone" placeholder="Enter your number"
          style="background-color: rgba(255, 255, 255, 0.3)">
      </div>



      <div class=container>

      </div>

      <div class="mb-3" style="background-color: rgba(255, 255, 255, 0.3)">
        <label for="desc" class="form-label">Any Suggetions</label>
        <textarea class="form-control" id="desc" name="desc" rows="3"
          style="background-color: rgba(255, 255, 255, 0.3)"></textarea>
      </div>
    </div>

    <div class="card" style="background-color: rgba(255, 255, 255, 0.3)">
      <div class="card-header">
        Contact Info
      </div>
      <div class="card-body">
        <h5 class="card-title">Contact no:<b>+918623950473</b></h5>
        <p class="card-text"></p>
        <a href="https://www.instagram.com/prathmesh_kale21?igsh=MTFzcWM3OW5razU4bQ==">Visit our Instagram</a>
      </div>

      <div class="card-body text-center">
        <button type="submit" class="btn btn-primary">Submit</button>
        <button type="reset" class="btn btn-primary">Reset</button>
      </div>




    </div>
  </div>







  </div>

  <div class=container>

  </div>
</form>
</body>
{%endblock body%}
